<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Vehicle Service Records</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ============================================
       Login Page
       Two roles: Admin & Customer
       ============================================ -->
  <div class="login-container">
    <!-- Step 1: Portal Selection -->
    <div class="login-card" id="portalSelector">
      <h1><span style="color: var(--black);">Rev</span> <span style="color: var(--white); background: var(--neon-green); padding: 0 0.4rem; border: 2px solid var(--black); box-shadow: 3px 3px 0 var(--black); border-radius: var(--radius-sm); margin-left: 0.2rem;">Track</span></h1>
      <p class="subtitle">Choose your portal to continue</p>

      <div class="vehicle-options" style="margin-top: 1.5rem;">
        <div class="vehicle-option-card" onclick="selectPortal('admin')" style="padding: 2rem;">
          <div class="label">Admin Portal</div>
          <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem;">Manage vehicles, services & tickets</p>
        </div>
        <div class="vehicle-option-card" onclick="selectPortal('customer')" style="padding: 2rem;">
          <div class="label">Customer Portal</div>
          <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem;">View service status & raise tickets</p>
        </div>
      </div>
    </div>

    <!-- Step 2: Login Form (hidden initially) -->
    <div class="login-card hidden" id="loginCard">
      <h1 id="portalTitle">Admin Login</h1>
      <p class="subtitle" id="portalSubtitle">Sign in to the Admin Portal</p>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            placeholder="Enter your username"
            autocomplete="username"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">
          Sign In
        </button>

        <!-- Error Message -->
        <p class="login-error" id="loginError"></p>
      </form>

      <button class="back-btn" onclick="backToPortalSelect()" style="margin-top: 1rem;">← Choose a different portal</button>

      <!-- Demo Credentials -->
      <div class="demo-credentials" id="demoCredentials">
        <strong>Demo Credentials</strong>
        <p id="demoCreds"></p>
      </div>

      <p id="showRegisterContainer" style="text-align: center; margin-top: 1rem; display: none;">
        Don't have an account? <a href="#" onclick="showRegisterForm(event)">Sign Up</a>
      </p>
    </div>

    <!-- Step 3: Register Form -->
    <div class="login-card hidden" id="registerCard">
      <h1>Create Account</h1>
      <p class="subtitle">Sign up for the Customer Portal</p>

      <form id="registerForm" onsubmit="handleRegisterSubmit(event)">
        <div class="form-group">
          <label for="reg_fullname">Full Name</label>
          <input
            type="text"
            id="reg_fullname"
            placeholder="Enter your full name"
            required
          >
        </div>

        <div class="form-group">
          <label for="reg_username">Username</label>
          <input
            type="text"
            id="reg_username"
            placeholder="Choose a username"
            required
          >
        </div>

        <div class="form-group">
          <label for="reg_password">Password</label>
          <input
            type="password"
            id="reg_password"
            placeholder="Choose a password"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary" id="registerBtn">
          Sign Up
        </button>

        <!-- Error Message -->
        <p class="login-error" id="registerError"></p>
      </form>

      <button class="back-btn" onclick="backToLogin()" style="margin-top: 1rem;">← Back to Login</button>
    </div>
  </div>

  <!-- ============================================
       Scripts
       ============================================ -->
  <script src="js/database.js?v=3"></script>
  <script src="js/auth.js?v=3"></script>

  <script>
    // Track selected portal
    let selectedPortal = null;

    /**
     * Initialize the login page
     */
    async function initLogin() {
      await initDatabase();

      // If already logged in, redirect to dashboard
      if (isLoggedIn()) {
        window.location.href = 'dashboard.html';
      }
    }

    /**
     * Select Admin or Customer portal
     * @param {string} portal - 'admin' or 'customer'
     */
    function selectPortal(portal) {
      selectedPortal = portal;
      sessionStorage.setItem('selectedPortal', portal);

      // Hide portal selector, show login form
      document.getElementById('portalSelector').classList.add('hidden');
      document.getElementById('loginCard').classList.remove('hidden');

      // Update UI based on portal
      if (portal === 'admin') {
        document.getElementById('portalTitle').textContent = 'Admin Login';
        document.getElementById('portalSubtitle').textContent = 'Sign in to the Admin Portal';
        document.getElementById('demoCreds').innerHTML = 'Admin: admin / admin123';
        document.getElementById('showRegisterContainer').style.display = 'none';
      } else {
        document.getElementById('portalTitle').textContent = 'Customer Login';
        document.getElementById('portalSubtitle').textContent = 'Sign in to the Customer Portal';
        document.getElementById('demoCreds').innerHTML = 'Customer 1: john / john123<br>Customer 2: jane / jane123';
        document.getElementById('showRegisterContainer').style.display = 'block';
      }

      // Clear any previous errors
      document.getElementById('loginError').textContent = '';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }

    /**
     * Go back to portal selection
     */
    function backToPortalSelect() {
      document.getElementById('loginCard').classList.add('hidden');
      document.getElementById('registerCard').classList.add('hidden');
      document.getElementById('portalSelector').classList.remove('hidden');
      selectedPortal = null;
    }

    /**
     * Show Registration Form
     */
    function showRegisterForm(event) {
      if (event) event.preventDefault();
      document.getElementById('loginCard').classList.add('hidden');
      document.getElementById('registerCard').classList.remove('hidden');
      document.getElementById('registerError').textContent = '';
      document.getElementById('reg_fullname').value = '';
      document.getElementById('reg_username').value = '';
      document.getElementById('reg_password').value = '';
    }

    /**
     * Go back to Login Form from Registration
     */
    function backToLogin() {
      document.getElementById('registerCard').classList.add('hidden');
      document.getElementById('loginCard').classList.remove('hidden');
    }

    /**
     * Handle registration submission
     */
    async function handleRegisterSubmit(event) {
      event.preventDefault();
      
      const fullname = document.getElementById('reg_fullname').value.trim();
      const username = document.getElementById('reg_username').value.trim();
      const password = document.getElementById('reg_password').value.trim();
      const errorEl = document.getElementById('registerError');
      
      if (!fullname || !username || !password) {
        errorEl.textContent = 'Please fill out all fields.';
        return;
      }
      
      const user = await registerUser(username, password, fullname);
      if (!user) {
        // apiPost typically shows its own toast, but we can provide a fallback
        errorEl.textContent = 'Registration failed. The username might already be taken.';
        return;
      }
      
      // Auto-login or just go back to login form
      showToast('Account created successfully! Please log in.', 'success');
      document.getElementById('username').value = username;
      backToLogin();
    }

    // Initialize on page load
    initLogin();
  </script>

</body>
</html>
